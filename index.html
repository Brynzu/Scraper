<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuscaPrecios Venezuela</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding-bottom: 50px; }
        header { background: linear-gradient(135deg, #112233, #1e3c72); color: white; padding: 30px 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { font-size: 24px; margin-bottom: 10px; }
        
        .buscador-container { max-width: 600px; margin: -25px auto 15px auto; background: white; padding: 15px; border-radius: 50px; display: flex; box-shadow: 0 10px 20px rgba(0,0,0,0.08); border: 2px solid #e0e0e0; }
        .buscador-container input { flex: 1; border: none; padding: 10px 20px; font-size: 16px; outline: none; background: transparent; }
        .buscador-container button { background-color: #ff9900; color: white; border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .buscador-container button:hover { background-color: #e68a00; }

        .filtros-container { max-width: 1000px; margin: 0 auto 20px auto; padding: 0 20px; display: flex; justify-content: flex-end; gap: 15px; flex-wrap: wrap; }
        .filtro-group { display: flex; align-items: center; gap: 8px; background: white; padding: 8px 16px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; font-weight: 600; color: #555; }
        .filtro-group select { border: 1px solid #ccc; padding: 5px 10px; border-radius: 4px; outline: none; background: #fafafa; cursor: pointer; font-weight: 500; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        .status { text-align: center; color: #666; font-style: italic; margin-bottom: 20px; font-weight: 500; }
        
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; border-top: 4px solid #1e3c72; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        
        .img-container { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; background-color: #fafafa; border-radius: 8px; overflow: hidden; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card h3 { font-size: 14px; color: #222; margin-bottom: 15px; line-height: 1.4; height: 40px; overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; line-clamp: 2; }
        
        .badges-container { display: flex; gap: 5px; margin-bottom: 10px; }
        
        /* DISEÑO DE MEDALLAS POR PLATAFORMA */
        .badge-ml { background-color: #fff59d; color: #5d4037; font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .badge-fb { background-color: #e8f0fe; color: #1a73e8; font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .badge-oferta { background-color: #ffe0b2; color: #e65100; font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        
        .bloque-precio { margin-bottom: 15px; min-height: 50px; display: flex; flex-direction: column; justify-content: flex-end; }
        .precio-anterior { font-size: 13px; color: #999; text-decoration: line-through; font-weight: 500; }
        .precio-actual { font-size: 22px; font-weight: 800; color: #2e7d32; }
        
        .btn-enlace { display: block; text-align: center; background-color: #1e3c72; color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-enlace:hover { background-color: #2a5298; }
    </style>
</head>
<body>

    <header>
        <h1>🇻🇪 BuscaPrecios Meta-Buscador</h1>
        <p>MercadoLibre 🤝 Facebook Marketplace en tiempo real</p>
    </header>

    <div class="buscador-container">
        <input type="text" id="inputBusqueda" placeholder="¿Qué quieres comparar hoy?... Ej: ps5, corolla, iphone">
        <button id="btnBuscar">Buscar</button>
    </div>

    <div class="filtros-container">
        <div class="filtro-group">
            <label for="selectCantidad">Mostrar:</label>
            <select id="selectCantidad">
                <option value="12">12 productos</option>
                <option value="24">24 productos</option>
                <option value="all">Todos los resultados</option>
            </select>
        </div>
        <div class="filtro-group">
            <label for="selectOrden">Ordenar por:</label>
            <select id="selectOrden">
                <option value="relevancia">Orden Original</option>
                <option value="barato">Precio: Menor a Mayor 💸</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div id="statusText" class="status">Digita un artículo para activar los motores de extracción en vivo.</div>
        <div class="grid-productos" id="contenedorProductos"></div>
    </div>

    <script>
        let productosEnMemoria = [];

        function renderizarProductos() {
            const contenedor = document.getElementById('contenedorProductos');
            const cantidadALocalizar = document.getElementById('selectCantidad').value;
            const ordenSeleccionado = document.getElementById('selectOrden').value;

            if (productosEnMemoria.length === 0) return;

            let productosProcesados = [...productosEnMemoria];

            if (ordenSeleccionado === 'barato') {
                productosProcesados.sort((a, b) => {
                    const precioA = parseFloat(a.precio_oferta.replace(/[^\d.]/g, '')) || 0;
                    const precioB = parseFloat(b.precio_oferta.replace(/[^\d.]/g, '')) || 0;
                    return precioA - precioB;
                });
            }

            if (cantidadALocalizar !== 'all') {
                const limite = parseInt(cantidadALocalizar);
                productosProcesados = productosProcesados.slice(0, limite);
            }

            contenedor.innerHTML = "";
            productosProcesados.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let htmlPrecios = '';
                // Asignar etiqueta según de dónde venga el producto
                let classBadge = prod.plataforma === 'MercadoLibre' ? 'badge-ml' : 'badge-fb';
                let htmlBadges = `<span class="${classBadge}">${prod.plataforma}</span>`;

                if (prod.tiene_oferta) {
                    htmlBadges += `<span class="badge-oferta">🔥 OFERTA</span>`;
                    htmlPrecios = `
                        <div class="precio-anterior">${prod.precio_original}</div>
                        <div class="precio-actual">${prod.precio_oferta}</div>
                    `;
                } else {
                    htmlPrecios = `
                        <div class="precio-actual">${prod.precio_original}</div>
                    `;
                }

                card.innerHTML = `
                    <div>
                        <div class="badges-container">${htmlBadges}</div>
                        <div class="img-container">
                            <img src="${prod.imagen}" alt="${prod.producto}">
                        </div>
                        <h3>${prod.producto}</h3>
                    </div>
                    <div>
                        <div class="bloque-precio">
                            ${htmlPrecios}
                        </div>
                        <a href="${prod.enlace}" target="_blank" class="btn-enlace">Ver en Tienda</a>
                    </div>
                `;
                contenedor.appendChild(card);
            });
        }

        document.getElementById('btnBuscar').addEventListener('click', async () => {
            const input = document.getElementById('inputBusqueda');
            const statusText = document.getElementById('statusText');
            const contenedor = document.getElementById('contenedorProductos');
            
            const productoABuscar = input.value.trim();

            if (!productoABuscar) {
                statusText.innerText = "⚠️ Escribe algo para poder buscar.";
                return;
            }
            
            statusText.innerText = `🕵️‍♂️ Conectando APIs y extrayendo de MercadoLibre y Facebook para "${productoABuscar}"...`;
            contenedor.innerHTML = ""; 

            try {
                const respuesta = await fetch(`/buscar?q=${encodeURIComponent(productoABuscar)}`);
                productosEnMemoria = await respuesta.json();

                if(productosEnMemoria.length === 0) {
                    statusText.innerText = "⚠️ No se encontraron ofertas válidas.";
                    return;
                }

                statusText.innerText = `🎯 ¡Comparativa cruzada exitosa para: "${productoABuscar}"!`;
                renderizarProductos();

            } catch (error) {
                statusText.innerText = "❌ Error general al comunicar con el meta-servidor.";
                console.error(error);
            }
        });

        document.getElementById('selectCantidad').addEventListener('change', renderizarProductos);
        document.getElementById('selectOrden').addEventListener('change', renderizarProductos);
    </script>
</body>
</html>
